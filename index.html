<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tree Jump - Auto Running Platformer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
            border: none;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
        }

        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            gap: 30px;
        }

        #menu.hidden {
            display: none;
        }

        .menu-title {
            font-size: clamp(32px, 8vw, 64px);
            color: white;
            font-weight: bold;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .character-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            max-width: 600px;
            width: 90%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .character-btn {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            border: 3px solid white;
            background: rgba(255, 255, 255, 0.2);
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .character-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .character-btn.selected {
            background: rgba(255, 255, 255, 0.8);
            transform: scale(1.15);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        .start-btn {
            padding: 20px 50px;
            font-size: clamp(18px, 4vw, 28px);
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        #gameHUD {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 100;
            gap: 20px;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            gap: 30px;
        }

        #gameOverScreen.show {
            display: flex;
        }

        .game-over-content {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 20px;
            color: white;
        }

        .game-over-content h1 {
            font-size: clamp(32px, 8vw, 56px);
            margin-bottom: 20px;
        }

        .game-over-stats {
            font-size: 20px;
            margin: 20px 0;
            line-height: 2;
        }

        .game-over-stats div {
            margin: 10px 0;
        }

        .restart-btn, .menu-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin: 10px;
            text-transform: uppercase;
        }

        .restart-btn:hover, .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .character-select {
                grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
                gap: 10px;
            }

            .character-btn {
                width: 70px;
                height: 70px;
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="gameHUD">
            <div class="hud-item">Level: <span id="levelDisplay">1</span></div>
            <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
            <div class="hud-item">Character: <span id="charDisplay">🌳</span></div>
        </div>
        <div id="menu">
            <div class="menu-title">🌳 TREE JUMP 🌳</div>
            <div>
                <p style="color: white; font-size: 18px; margin-bottom: 20px; text-align: center;">Select Your Character:</p>
                <div class="character-select" id="characterSelect"></div>
            </div>
            <button class="start-btn" id="startBtn">START GAME</button>
        </div>
        <div id="gameOverScreen">
            <div class="game-over-content">
                <h1 id="gameOverTitle">Game Over!</h1>
                <div class="game-over-stats">
                    <div>Level Reached: <strong id="finalLevel">1</strong></div>
                    <div>Final Score: <strong id="finalScore">0</strong></div>
                    <div>Total Coins: <strong id="totalCoins">0</strong></div>
                </div>
                <div class="button-group">
                    <button class="restart-btn" id="restartBtn">Try Again</button>
                    <button class="menu-btn" id="menuBtn">Main Menu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
